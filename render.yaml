services:
  - type: web
    name: march-madness
    runtime: node
    buildCommand: cd server && npm install && cd ../client && npm install && npm run build
    startCommand: cd server && node index.js
    envVars:
      - key: NODE_ENV
        value: production
    # Persistent disk keeps SQLite data alive across deploys (~$1/mo on Render).
    # Remove the disk block below if you don't need cross-deploy persistence.
    disk:
      name: data
      mountPath: /var/data
      sizeGB: 1
